<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #chat-section { width: 300px; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; padding: 10px; overflow-y: auto; background: #f9f9f9; }
        #input-area { padding: 10px; border-top: 1px solid #ccc; }
        #preview-section { flex-grow: 1; display: flex; flex-direction: column; }
        iframe { flex-grow: 1; border: none; width: 100%; }
        input { width: 80%; padding: 5px; }
    </style>
</head>
<body>

<div id="chat-section">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type 'open lastattempt'...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="preview-section">
    <iframe id="previewFrame" src="about:blank"></iframe>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const msg = input.value.trim();
        const messages = document.getElementById('messages');
        const frame = document.getElementById('previewFrame');

        if (!msg) return;

        // Display user message
        messages.innerHTML += `<p><b>You:</b> ${msg}</p>`;

        // Check for the command
        if (msg.toLowerCase().startsWith('open ')) {
            const domain = msg.split(' ')[1];
            // Format URL (adding https://)
            const url = `https://${domain}.in`;
            frame.src = url;
            messages.innerHTML += `<p style="color: blue;"><i>Assistant: Opening ${url}...</i></p>`;
        } else {
            messages.innerHTML += `<p><i>Assistant: I didn't recognize that command.</i></p>`;
        }

        input.value = '';
    }
</script>
</body>
</html>
