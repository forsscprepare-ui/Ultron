<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ULTRON — Voice Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --void: #05060a;
    --panel: #0b0e16;
    --core: #ff2e2e;
    --core-dim: #7a1414;
    --steel: #4a5568;
    --text: #d8dde6;
    --text-dim: #6b7280;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{
    height:100%;
    background: radial-gradient(ellipse at center, #0d1018 0%, var(--void) 70%);
    font-family: 'Courier New', 'Consolas', monospace;
    color: var(--text);
    overflow: hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    height:100vh;
    position: relative;
  }

  /* faint scanline / grid texture */
  body::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,46,46,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,46,46,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }

  .stage{
    position:relative;
    width: 320px;
    height: 320px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* outer rotating ring */
  .ring{
    position:absolute;
    border-radius:50%;
    border: 1px solid rgba(255,46,46,0.25);
  }
  .ring1{ width:320px; height:320px; animation: spin 18s linear infinite; }
  .ring2{ width:260px; height:260px; border-style:dashed; animation: spin 26s linear infinite reverse; }
  .ring3{ width:200px; height:200px; border-color: rgba(255,46,46,0.4); animation: spin 12s linear infinite; }

  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* core orb */
  .core{
    width: 120px;
    height: 120px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #ff5f5f, var(--core) 45%, var(--core-dim) 100%);
    box-shadow:
      0 0 30px 6px rgba(255,46,46,0.35),
      inset 0 0 30px rgba(0,0,0,0.4);
    position:relative;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .core::after{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.35) 100%);
  }

  /* state: idle (dormant, dim, slow pulse) */
  .stage.idle .core{
    animation: breathe 4s ease-in-out infinite;
    filter: saturate(0.4) brightness(0.6);
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.04); }
  }

  /* state: listening (bright, faster pulse, ring speeds implied by color) */
  .stage.listening .core{
    animation: pulseListen 1.1s ease-in-out infinite;
    filter: saturate(1) brightness(1);
  }
  @keyframes pulseListen{
    0%,100%{ transform:scale(1); box-shadow:0 0 30px 6px rgba(255,46,46,0.35), inset 0 0 30px rgba(0,0,0,0.4);}
    50%{ transform:scale(1.12); box-shadow:0 0 55px 16px rgba(255,46,46,0.6), inset 0 0 30px rgba(0,0,0,0.4);}
  }

  /* state: speaking (rapid flicker) */
  .stage.speaking .core{
    animation: pulseSpeak 0.35s ease-in-out infinite;
  }
  @keyframes pulseSpeak{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }

  /* state: granted (green-ish confirm flash) */
  .stage.granted .core{
    background: radial-gradient(circle at 35% 30%, #6dffb0, #12a464 45%, #06502f 100%);
    box-shadow: 0 0 50px 14px rgba(20,220,140,0.5), inset 0 0 30px rgba(0,0,0,0.4);
  }

  /* state: denied (harsh red flash) */
  .stage.denied .core{
    animation: shake 0.4s ease-in-out;
    background: radial-gradient(circle at 35% 30%, #ff8080, #cc0000 45%, #4a0000 100%);
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }

  .label{
    margin-top: 42px;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align:center;
    min-height: 18px;
  }

  .caption{
    margin-top: 14px;
    font-size: 15px;
    color: var(--text);
    text-align:center;
    max-width: 480px;
    min-height: 24px;
    letter-spacing: 0.5px;
  }

  .brand{
    position:absolute;
    top: 28px;
    left:50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--core);
    opacity: 0.85;
  }

  .footer-hint{
    position:absolute;
    bottom: 26px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align:center;
  }

  .tap-veil{
    position:absolute; inset:0;
    background: var(--void);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    z-index: 10;
    cursor:pointer;
  }
  .tap-veil .go{
    width:90px; height:90px;
    border-radius:50%;
    border:1px solid rgba(255,46,46,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    letter-spacing:2px;
    color: var(--core);
    animation: breathe 3s ease-in-out infinite;
    transition: opacity 0.3s ease, border-color 0.3s ease;
  }
  .tap-veil.loading .go{
    opacity: 0.35;
    animation: none;
    cursor: not-allowed;
  }
  .tap-veil.ready .go{
    opacity: 1;
    border-color: rgba(255,46,46,0.9);
    cursor: pointer;
  }
  .tap-veil p{
    color: var(--text-dim);
    font-size:12px;
    letter-spacing:2px;
  }
  .progress-track{
    width: 200px;
    height: 3px;
    background: rgba(255,46,46,0.15);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--core-dim), var(--core));
    border-radius: 2px;
    transition: width 0.25s ease;
  }
  .tap-veil.ready .progress-track{
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  /* ---- Iframe modal (in-page popup for opened sites) ---- */
  .frame-modal{
    position: fixed;
    inset: 0;
    background: rgba(5,6,10,0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 24px;
  }
  .frame-modal.open{
    display: flex;
  }
  .frame-window{
    width: min(1000px, 100%);
    height: min(700px, 90vh);
    background: var(--panel);
    border: 1px solid rgba(255,46,46,0.4);
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .frame-titlebar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #0d1018;
    border-bottom: 1px solid rgba(255,46,46,0.25);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .frame-titlebar .frame-close{
    cursor: pointer;
    color: var(--core);
    font-size: 16px;
    line-height: 1;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s ease;
  }
  .frame-titlebar .frame-close:hover{
    background: rgba(255,46,46,0.15);
  }
  .frame-window iframe{
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }
</style>
</head>
<body>

  <div class="frame-modal" id="frameModal">
    <div class="frame-window">
      <div class="frame-titlebar">
        <span id="frameTitle">GITHUB</span>
        <span class="frame-close" id="frameCloseBtn">✕</span>
      </div>
      <iframe id="siteFrame" src="about:blank"></iframe>
    </div>
  </div>

  <div class="tap-veil" id="tapVeil">
    <div class="go" id="goBtn">···</div>
    <p id="veilStatus">LOADING SYSTEM…</p>
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="brand">U L T R O N</div>

  <div class="stage idle" id="stage">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="core" id="core"></div>
  </div>

  <div class="label" id="stateLabel">DORMANT</div>
  <div class="caption" id="caption"></div>

  <div class="footer-hint">VOICE ACTIVATED &nbsp;•&nbsp; NO TEXT INPUT REQUIRED</div>

<script>
(function(){
  const tapVeil = document.getElementById('tapVeil');
  const stage = document.getElementById('stage');
  const stateLabel = document.getElementById('stateLabel');
  const caption = document.getElementById('caption');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;

  const PASSPHRASE = "get up ultron";

  function setState(name){
    stage.className = 'stage ' + name;
  }

  function setLabel(text){
    stateLabel.textContent = text;
  }

  function setCaption(text){
    caption.textContent = text;
  }

  // Pick the most natural-sounding voice available.
  // On ChromeOS, "Google US English" / "Google UK English Female" etc. are
  // network-backed voices and sound noticeably better than local/offline ones.
  let chosenVoice = null;
  let voicesReady = false;

  function scoreVoice(v){
    let score = 0;
    if (/Google/i.test(v.name)) score += 50;          // ChromeOS network voices
    if (/Natural|Neural|Online/i.test(v.name)) score += 40;
    if (/en-US/i.test(v.lang)) score += 15;
    if (/en-GB/i.test(v.lang)) score += 10;
    if (/en-IN/i.test(v.lang)) score += 8;
    if (/^en/i.test(v.lang)) score += 5;
    if (v.localService === false) score += 10;         // network voices > local
    return score;
  }

  function pickVoice(){
    const voices = synth.getVoices();
    if (!voices.length) return false;
    chosenVoice = voices.slice().sort((a, b) => scoreVoice(b) - scoreVoice(a))[0];
    voicesReady = true;
    return true;
  }
  if (synth) {
    synth.onvoiceschanged = pickVoice;
    pickVoice();
  }

  function waitForVoices(timeoutMs){
    return new Promise((resolve) => {
      if (voicesReady && chosenVoice) { resolve(true); return; }
      const start = Date.now();
      const check = setInterval(() => {
        if (pickVoice() || Date.now() - start > timeoutMs){
          clearInterval(check);
          resolve(true);
        }
      }, 100);
    });
  }

  function speak(text, onEnd){
    setCaption(text);
    if (!synth) { if (onEnd) onEnd(); return; }
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (chosenVoice) utter.voice = chosenVoice;
    utter.rate = 1.0;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    setState('speaking');
    utter.onstart = () => setState('speaking');
    utter.onend = () => { if (onEnd) onEnd(); };
    synth.speak(utter);
  }

  function timeGreeting(){
    const h = new Date().getHours();
    if (h < 12) return "Good morning.";
    if (h < 17) return "Good afternoon.";
    return "Good evening.";
  }

  // ---- Persistent mic stream + single reused recognition instance ----
  // The mic is requested via getUserMedia exactly ONCE per page load and
  // kept alive for the whole session. SpeechRecognition is created ONCE
  // and reused for every listen instead of a fresh instance each time.
  // This is what stops repeated permission prompts.
  let micStream = null;
  let recognizer = null;

  function buildRecognizer(){
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.continuous = false; // one-shot mode - matches the original working
                             // verification behavior. The always-listening
                             // command loop switches this to true separately
                             // once verification succeeds.
    return rec;
  }

  function listenOnce(timeoutMs){
    return new Promise((resolve) => {
      if (!SpeechRecognition || !recognizer) { resolve(null); return; }
      let done = false;
      let timer = null;

      const finish = (value) => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        recognizer.onresult = null;
        recognizer.onerror = null;
        recognizer.onend = null;
        resolve(value);
      };

      setState('listening');
      setLabel('LISTENING');

      recognizer.onresult = (e) => {
        const said = e.results[0][0].transcript.trim().toLowerCase();
        finish(said);
      };
      recognizer.onerror = () => finish(null);
      recognizer.onend = () => finish(null);

      try {
        recognizer.start();
      } catch (e) {
        // start() throws if already running - recover, caller retries
        finish(null);
      }

      if (timeoutMs){
        timer = setTimeout(() => {
          if (!done){
            try { recognizer.stop(); } catch(e){}
          }
        }, timeoutMs);
      }
    });
  }

  async function verifyMicPermission(){
    setLabel('CHECKING PERMISSIONS');
    setCaption('');
    try {
      // This is the ONE and ONLY place the mic is ever requested per session.
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Build the single reusable recognition instance now that permission is granted.
      recognizer = buildRecognizer();
      return true;
    } catch (err) {
      return false;
    }
  }

  async function bootSequence(){
    setState('granted');
    setLabel('READY');

    // Mic permission and voice engine were already confirmed during preflight,
    // so we go straight to the greeting with no extra waiting.
    const greeting = timeGreeting() + " Please verify. Say the security phrase.";
    speak(greeting, async () => {
      await attemptVerification(1);
    });
  }

  function matchesPassphrase(said){
    if (!said) return false;
    const clean = said.replace(/[.,!?]/g, '').trim();
    if (clean.includes(PASSPHRASE)) return true;
    const words = PASSPHRASE.split(' ');
    const hitCount = words.filter(w => clean.includes(w)).length;
    return hitCount >= 3;
  }

  async function attemptVerification(attemptNumber){
    await new Promise(r => setTimeout(r, 300));
    const said = await listenOnce(7000);
    setLabel('VERIFYING');

    if (matchesPassphrase(said)){
      setState('granted');
      setLabel('ACCESS GRANTED');
      speak("Okay. Let's start.", () => {
        setState('idle');
        setLabel('READY');
        setCaption('System ready. Say "open GitHub" to begin.');
        startCommandLoop();
      });
      return;
    }

    if (attemptNumber >= 3){
      setState('denied');
      setLabel('LOCKED OUT');
      speak("Verification failed too many times. System locked. Reload the page to try again.");
      return;
    }

    setState('denied');
    setLabel('NOT RECOGNIZED');
    speak("That didn't match. Please say the security phrase again.", async () => {
      await attemptVerification(attemptNumber + 1);
    });
  }

  // ---- Command engine: open GitHub in an in-page iframe ----
  // Scoped to GitHub only for now. More sites/features get added here later.
  const frameModal = document.getElementById('frameModal');
  const siteFrame = document.getElementById('siteFrame');
  const frameTitle = document.getElementById('frameTitle');
  const frameCloseBtn = document.getElementById('frameCloseBtn');

  let frameOpenSite = null; // tracks which site is currently shown, e.g. 'github'

  function openSiteInFrame(name, url){
    siteFrame.src = url;
    frameTitle.textContent = name.toUpperCase();
    frameModal.classList.add('open');
    frameOpenSite = name;
  }

  function closeSiteFrame(){
    frameModal.classList.remove('open');
    siteFrame.src = 'about:blank';
    frameOpenSite = null;
  }

  frameCloseBtn.addEventListener('click', closeSiteFrame);

  // Common ways Chrome's speech recognizer mishears "GitHub" - "guitar",
  // "get hub", "get tub" etc. are frequent near-sound misfires.
  const GITHUB_VARIANTS = ['github', 'git hub', 'get hub', 'guitar', 'get tub', 'git tub'];

  function mentionsGithub(text){
    return GITHUB_VARIANTS.some(variant => text.includes(variant));
  }

  function handleCommand(said){
    if (!said) return false;

    if (said.includes('open') && mentionsGithub(said)){
      openSiteInFrame('github', 'https://www.github.com');
      speak('Opening GitHub.');
      return true;
    }

    if (said.includes('close')){
      if (frameOpenSite){
        speak(`Closing ${frameOpenSite}.`);
        closeSiteFrame();
      } else {
        speak('Nothing is open right now.');
      }
      return true;
    }

    return false;
  }

  let commandLoopActive = false;
  let restartTimer = null;

  function startCommandLoop(){
    if (commandLoopActive) return; // avoid double loops
    commandLoopActive = true;
    recognizer.continuous = true; // switch to continuous mode now that
                                    // verification (one-shot mode) is done
    recognizer.interimResults = true; // needed so multi-word phrases like
                                       // "open github" aren't split into
                                       // separate final results by a mid-
                                       // sentence pause
    attachCommandListeners();
    startRecognizerSafely();
  }

  function stopCommandLoop(){
    commandLoopActive = false;
    if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
    try { recognizer.stop(); } catch(e){}
  }

  function startRecognizerSafely(){
    if (!commandLoopActive) return;
    try {
      recognizer.start();
      setState('listening');
      setLabel('LISTENING');
    } catch (e) {
      // already running - ignore, it's fine
    }
  }

  // Instead of restarting the recognizer after every single utterance
  // (which is what triggered Chrome's "Page Unresponsive" warning during
  // long sessions), we attach the event handlers ONCE and let the
  // recognizer stay in continuous mode. It only restarts when the browser
  // itself ends the session (silence timeout, network hiccup, etc), and
  // even then with a short debounce so restarts can't happen back-to-back.
  let lastProcessedResultIndex = 0;

  function attachCommandListeners(){
    lastProcessedResultIndex = 0;

    recognizer.onresult = (e) => {
      // Merge every final chunk from this utterance turn together, so a
      // natural pause between words (e.g. "open" ... "github") doesn't get
      // split into two separate commands. We only act once the browser
      // marks the last chunk in this turn as final.
      let combined = '';
      let allFinal = true;

      for (let i = lastProcessedResultIndex; i < e.results.length; i++){
        combined += e.results[i][0].transcript + ' ';
        if (!e.results[i].isFinal) allFinal = false;
      }

      if (!allFinal) return; // still speaking, wait for the full phrase

      const said = combined.trim().toLowerCase();
      lastProcessedResultIndex = e.results.length;

      if (said){
        const handled = handleCommand(said);
        setLabel('READY');
        if (!handled){
          setCaption(`Heard: "${said}" — no matching command.`);
        }
      }
    };

    recognizer.onerror = (e) => {
      // 'no-speech' happens constantly in continuous mode while waiting
      // for you to talk - that's normal, not an error worth logging.
      if (e.error !== 'no-speech'){
        console.warn('Recognition error:', e.error);
      }
    };

    recognizer.onend = () => {
      // Browser ended the session on its own. Debounce the restart so we
      // never hammer start()/stop() in a tight loop.
      if (!commandLoopActive) return;
      lastProcessedResultIndex = 0; // fresh session -> fresh results array
      if (restartTimer) clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        startRecognizerSafely();
      }, 600);
    };
  }

  tapVeil.addEventListener('click', () => {
    if (!tapVeil.classList.contains('ready')) return; // ignore taps while still loading
    tapVeil.style.display = 'none';
    bootSequence();
  }, { once: false });

  // ---- Pre-flight readiness check ----
  // Runs before the ENGAGE button is enabled. Real progress bar tracks
  // actual stages instead of a fake timer:
  //  1. Confirm SpeechRecognition is supported
  //  2. Request mic permission NOW (during loading, not after tap) so the
  //     Allow-popup delay happens before ENGAGE is even shown as ready
  //  3. Load voice engine
  // Once all three are done, ENGAGE lights up and tapping it goes straight
  // into the greeting with no further waiting.
  async function preflight(){
    const veilStatus = document.getElementById('veilStatus');
    const goBtn = document.getElementById('goBtn');
    const progressFill = document.getElementById('progressFill');
    tapVeil.classList.add('loading');

    const setProgress = (pct) => { progressFill.style.width = pct + '%'; };

    if (!SpeechRecognition) {
      veilStatus.textContent = 'SPEECH RECOGNITION NOT SUPPORTED IN THIS BROWSER';
      goBtn.textContent = '✕';
      setProgress(0);
      return;
    }
    setProgress(15);

    veilStatus.textContent = 'REQUESTING MICROPHONE…';
    const granted = await verifyMicPermission();
    setProgress(65);

    if (!granted){
      veilStatus.textContent = 'MICROPHONE ACCESS DENIED — RELOAD TO RETRY';
      goBtn.textContent = '✕';
      setProgress(0);
      return;
    }

    veilStatus.textContent = 'LOADING VOICE ENGINE…';
    await waitForVoices(4000);
    setProgress(100);

    veilStatus.textContent = 'TAP TO INITIALIZE';
    goBtn.textContent = 'ENGAGE';
    tapVeil.classList.remove('loading');
    tapVeil.classList.add('ready');
  }

  preflight();

})();
</script>

</body>
</html>
