<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ULTRON — Voice Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --void: #05060a;
    --panel: #0b0e16;
    --core: #ff2e2e;
    --core-dim: #7a1414;
    --steel: #4a5568;
    --text: #d8dde6;
    --text-dim: #6b7280;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{
    height:100%;
    background: radial-gradient(ellipse at center, #0d1018 0%, var(--void) 70%);
    font-family: 'Courier New', 'Consolas', monospace;
    color: var(--text);
    overflow: hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    height:100vh;
    position: relative;
  }

  /* faint scanline / grid texture */
  body::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,46,46,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,46,46,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }

  .stage{
    position:relative;
    width: 320px;
    height: 320px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* outer rotating ring */
  .ring{
    position:absolute;
    border-radius:50%;
    border: 1px solid rgba(255,46,46,0.25);
  }
  .ring1{ width:320px; height:320px; animation: spin 18s linear infinite; }
  .ring2{ width:260px; height:260px; border-style:dashed; animation: spin 26s linear infinite reverse; }
  .ring3{ width:200px; height:200px; border-color: rgba(255,46,46,0.4); animation: spin 12s linear infinite; }

  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* core orb */
  .core{
    width: 120px;
    height: 120px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #ff5f5f, var(--core) 45%, var(--core-dim) 100%);
    box-shadow:
      0 0 30px 6px rgba(255,46,46,0.35),
      inset 0 0 30px rgba(0,0,0,0.4);
    position:relative;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .core::after{
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.35) 100%);
  }

  /* state: idle (dormant, dim, slow pulse) */
  .stage.idle .core{
    animation: breathe 4s ease-in-out infinite;
    filter: saturate(0.4) brightness(0.6);
  }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.04); }
  }

  /* state: listening (bright, faster pulse, ring speeds implied by color) */
  .stage.listening .core{
    animation: pulseListen 1.1s ease-in-out infinite;
    filter: saturate(1) brightness(1);
  }
  @keyframes pulseListen{
    0%,100%{ transform:scale(1); box-shadow:0 0 30px 6px rgba(255,46,46,0.35), inset 0 0 30px rgba(0,0,0,0.4);}
    50%{ transform:scale(1.12); box-shadow:0 0 55px 16px rgba(255,46,46,0.6), inset 0 0 30px rgba(0,0,0,0.4);}
  }

  /* state: speaking (rapid flicker) */
  .stage.speaking .core{
    animation: pulseSpeak 0.35s ease-in-out infinite;
  }
  @keyframes pulseSpeak{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }

  /* state: granted (green-ish confirm flash) */
  .stage.granted .core{
    background: radial-gradient(circle at 35% 30%, #6dffb0, #12a464 45%, #06502f 100%);
    box-shadow: 0 0 50px 14px rgba(20,220,140,0.5), inset 0 0 30px rgba(0,0,0,0.4);
  }

  /* state: denied (harsh red flash) */
  .stage.denied .core{
    animation: shake 0.4s ease-in-out;
    background: radial-gradient(circle at 35% 30%, #ff8080, #cc0000 45%, #4a0000 100%);
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }

  .label{
    margin-top: 42px;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align:center;
    min-height: 18px;
  }

  .caption{
    margin-top: 14px;
    font-size: 15px;
    color: var(--text);
    text-align:center;
    max-width: 480px;
    min-height: 24px;
    letter-spacing: 0.5px;
  }

  .brand{
    position:absolute;
    top: 28px;
    left:50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--core);
    opacity: 0.85;
  }

  .footer-hint{
    position:absolute;
    bottom: 26px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align:center;
  }

  .tap-veil{
    position:absolute; inset:0;
    background: var(--void);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    z-index: 10;
    cursor:pointer;
  }
  .tap-veil .go{
    width:90px; height:90px;
    border-radius:50%;
    border:1px solid rgba(255,46,46,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    letter-spacing:2px;
    color: var(--core);
    animation: breathe 3s ease-in-out infinite;
  }
  .tap-veil p{
    color: var(--text-dim);
    font-size:12px;
    letter-spacing:2px;
  }
</style>
</head>
<body>

  <div class="tap-veil" id="tapVeil">
    <div class="go">ENGAGE</div>
    <p>TAP TO INITIALIZE</p>
  </div>

  <div class="brand">U L T R O N</div>

  <div class="stage idle" id="stage">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="core" id="core"></div>
  </div>

  <div class="label" id="stateLabel">DORMANT</div>
  <div class="caption" id="caption"></div>

  <div class="footer-hint">VOICE ACTIVATED &nbsp;•&nbsp; NO TEXT INPUT REQUIRED</div>

<script>
(function(){
  const tapVeil = document.getElementById('tapVeil');
  const stage = document.getElementById('stage');
  const stateLabel = document.getElementById('stateLabel');
  const caption = document.getElementById('caption');

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;

  const PASSPHRASE = "get up ultron";

  function setState(name){
    stage.className = 'stage ' + name;
  }

  function setLabel(text){
    stateLabel.textContent = text;
  }

  function setCaption(text){
    caption.textContent = text;
  }

  // Pick the most natural-sounding voice available
  let chosenVoice = null;
  function pickVoice(){
    const voices = synth.getVoices();
    if (!voices.length) return;
    const preferredNames = [
      'Microsoft Aria Online', 'Microsoft Guy Online', 'Microsoft Ryan Online',
      'Microsoft Sonia Online', 'Google UK English Male', 'Google UK English Female',
      'Google US English', 'Samantha', 'Daniel', 'Alex', 'Karen', 'Moira'
    ];
    chosenVoice =
      voices.find(v => preferredNames.some(name => v.name.includes(name))) ||
      voices.find(v => /en-GB|en-US/i.test(v.lang) && /Online|Natural|Neural/i.test(v.name)) ||
      voices.find(v => /en-GB|en-US|en-IN/i.test(v.lang)) ||
      voices.find(v => /^en/i.test(v.lang)) ||
      voices[0];
  }
  if (synth) {
    synth.onvoiceschanged = pickVoice;
    pickVoice();
  }

  function speak(text, onEnd){
    setCaption(text);
    if (!synth) { if (onEnd) onEnd(); return; }
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (chosenVoice) utter.voice = chosenVoice;
    utter.rate = 1.0;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    setState('speaking');
    utter.onstart = () => setState('speaking');
    utter.onend = () => {
      if (onEnd) onEnd();
    };
    synth.speak(utter);
  }

  function timeGreeting(){
    const h = new Date().getHours();
    if (h < 12) return "Good morning.";
    if (h < 17) return "Good afternoon.";
    return "Good evening.";
  }

  // ---- Persistent mic stream + single reused recognition instance ----
  // The mic is requested via getUserMedia exactly ONCE per page load and
  // kept alive for the whole session. SpeechRecognition is created ONCE
  // and reused for every listen instead of a fresh instance each time.
  // This is what stops repeated permission prompts.
  let micStream = null;
  let recognizer = null;

  function buildRecognizer(){
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.continuous = false;
    return rec;
  }

  function listenOnce(timeoutMs){
    return new Promise((resolve) => {
      if (!SpeechRecognition || !recognizer) { resolve(null); return; }
      let done = false;
      let timer = null;

      const finish = (value) => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        recognizer.onresult = null;
        recognizer.onerror = null;
        recognizer.onend = null;
        resolve(value);
      };

      setState('listening');
      setLabel('LISTENING');

      recognizer.onresult = (e) => {
        const said = e.results[0][0].transcript.trim().toLowerCase();
        finish(said);
      };
      recognizer.onerror = () => finish(null);
      recognizer.onend = () => finish(null);

      try {
        recognizer.start();
      } catch (e) {
        // start() throws if already running - recover, caller retries
        finish(null);
      }

      if (timeoutMs){
        timer = setTimeout(() => {
          if (!done){
            try { recognizer.stop(); } catch(e){}
          }
        }, timeoutMs);
      }
    });
  }

  async function verifyMicPermission(){
    setLabel('CHECKING PERMISSIONS');
    setCaption('');
    try {
      // This is the ONE and ONLY place the mic is ever requested per session.
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Build the single reusable recognition instance now that permission is granted.
      recognizer = buildRecognizer();
      return true;
    } catch (err) {
      return false;
    }
  }

  async function bootSequence(){
    setState('idle');
    setLabel('BOOTING');

    const granted = await verifyMicPermission();

    if (!granted){
      setState('denied');
      setLabel('ACCESS DENIED');
      speak("Microphone access is blocked. Please allow microphone permission in your browser settings, then reload.");
      return;
    }

    setState('granted');
    setLabel('PERMISSIONS OK');
    await new Promise(r => setTimeout(r, 600));

    // Time-based greeting + ask for passphrase
    const greeting = timeGreeting() + " Please verify. Say the security phrase.";
    speak(greeting, async () => {
      await attemptVerification(1);
    });
  }

  function matchesPassphrase(said){
    if (!said) return false;
    const clean = said.replace(/[.,!?]/g, '').trim();
    if (clean.includes(PASSPHRASE)) return true;
    const words = PASSPHRASE.split(' ');
    const hitCount = words.filter(w => clean.includes(w)).length;
    return hitCount >= 3;
  }

  async function attemptVerification(attemptNumber){
    await new Promise(r => setTimeout(r, 300));
    const said = await listenOnce(7000);
    setLabel('VERIFYING');

    if (matchesPassphrase(said)){
      setState('granted');
      setLabel('ACCESS GRANTED');
      speak("Okay. Let's start.", () => {
        setState('idle');
        setLabel('READY');
        setCaption('System ready. Awaiting further instructions.');
      });
      return;
    }

    if (attemptNumber >= 3){
      setState('denied');
      setLabel('LOCKED OUT');
      speak("Verification failed too many times. System locked. Reload the page to try again.");
      return;
    }

    setState('denied');
    setLabel('NOT RECOGNIZED');
    speak("That didn't match. Please say the security phrase again.", async () => {
      await attemptVerification(attemptNumber + 1);
    });
  }

  tapVeil.addEventListener('click', () => {
    tapVeil.style.display = 'none';
    bootSequence();
  }, { once: true });

})();
</script>

</body>
</html>
